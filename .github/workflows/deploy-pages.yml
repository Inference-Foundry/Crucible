name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

# Grant the GITHUB_TOKEN permissions required to deploy to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; cancel any in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy static site to GitHub Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # The site is pure static HTML/CSS/JS — no build step needed.
      # Upload the entire repository root as the Pages artifact.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
